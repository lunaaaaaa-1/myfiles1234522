<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡placeholder⚡</title>
    <style>
        :root { --bg: #06040d; --panel: #100a21; --pink: #ff0055; --cyan: #00f0ff; --green: #39ff14; }
        body { font-family: monospace; background: var(--bg); color: #d2c9e3; padding: 15px; text-align: center; }
        body::before { content: ""; position: fixed; top:0; left:0; width:100vw; height:100vh; background: linear-gradient(rgba(0,240,255,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0,240,255,0.03) 1px, transparent 1px); background-size: 25px 25px; z-index: -1; animation: grid 12s linear infinite; }
        @keyframes grid { 0% { background-position: 0 0; } 100% { background-position: 0 100%; } }
        .tabs { display: flex; max-width: 600px; margin: 20px auto 0; gap: 5px; }
        .tab { background: #1a1430; border: 1px solid #33255c; color: #7f6da3; padding: 10px; cursor: pointer; flex: 1; font-weight: bold; border-radius: 4px 4px 0 0; }
        .tab.active { background: var(--panel); border-color: var(--cyan); color: var(--cyan); text-shadow: 0 0 5px var(--cyan); }
        .frame { background: var(--panel); border: 2px solid var(--cyan); max-width: 600px; margin: 0 auto; padding: 20px; border-radius: 0 4px 4px 4px; box-shadow: 0 0 15px rgba(0,240,255,0.1); }
        .sec { display: none; } .sec.active { display: block; }
        .feed { background: #090514; border: 1px solid #281f4a; height: 250px; border-radius: 4px; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; text-align: left; }
        .pk { max-width: 85%; padding: 8px 12px; border-radius: 6px; font-size: 13px; line-height: 1.4; word-break: break-all; }
        .pk.cl { background: rgba(255,0,85,0.08); border: 1px solid var(--pink); color: #fff; align-self: flex-end; }
        .pk.nd { background: rgba(0,240,255,0.06); border: 1px solid var(--cyan); color: #fff; align-self: flex-start; }
        .meta { font-size: 9px; color: #625382; margin-bottom: 3px; display: block; }
        .grid { display: grid; grid-template-columns: 1fr auto; gap: 10px; margin-top: 15px; }
        .in { background: #090514; border: 1px solid #33255c; padding: 12px; color: var(--green); font-family: monospace; outline: none; border-radius: 4px; }
        .btn { background: var(--pink); color: #fff; border: none; padding: 0 20px; font-weight: bold; cursor: pointer; border-radius: 4px; }
        .up-btn { background: var(--cyan); color: #000; border: none; padding: 12px; font-weight: bold; width: 100%; cursor: pointer; border-radius: 4px; margin-top: 10px; }
    </style>
    <script src="https://pusher.com"></script>
</head>
<body>

    <h1 style="color: var(--cyan); text-shadow: 0 0 8px var(--cyan); margin: 0;">ASYNC MATRIX</h1>
    <p style="color: var(--pink); font-size: 11px; margin: 0 0 10px 0;">[COMMUNICATION TERMINAL v5.0]</p>

    <div class="tabs">
        <button id="t1" class="tab active" onclick="gate('mSec','t1')">[COMMS_LINK]</button>
        <button id="t2" class="tab" onclick="gate('fSec','t2')">[PIPELINE]</button>
    </div>

    <div class="frame">
        <div id="mSec" class="sec active">
            <div class="feed" id="feed">
                <div class="pk nd"><span class="meta">[SYS_DAEMON]</span>Bridge ready. Text typed here syncs live to your VR headset!</div>
            </div>
            <div class="grid">
                <input type="text" id="msg" class="in" placeholder="Type text packet..." onkeypress="if(event.key==='Enter')tx()">
                <button class="btn" onclick="tx()">EXECUTE</button>
            </div>
        </div>

        <div id="fSec" class="sec">
            <div style="border:1px dashed #33255c; padding: 30px; background:#090514;">
                <input type="file" id="file" style="width:100%;">
                <button class="up-btn" onclick="up()">INITIALIZE STREAM</button>
            </div>
            <div id="log" style="font-size:12px; color:#ffeb3b; margin-top:10px; text-align:left;">Standby...</div>
        </div>
    </div>

    <script>
        const pusher = new Pusher('434190c13bf366c88aa4', { cluster: 'us2', forceTLS: true });
        const channel = pusher.subscribe('luna-stream-channel');
        const sid = 'STATION_' + Math.floor(Math.random()*10000);

        channel.bind('matrix-payload', d => { if(d.senderID !== sid) add('nd', d.text, d.timestamp, '[REMOTE_NODE]'); });

        function gate(s, t) {
            document.querySelectorAll('.sec').forEach(x => x.classList.remove('active'));
            document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
            document.getElementById(s).classList.add('active'); document.getElementById(t).classList.add('active');
        }

        function add(side, txt, time, meta) {
            const f = document.getElementById('feed');
            f.innerHTML += `<div class="pk ${side}"><span class="meta">${meta} // ${time}</span>${txt.replace(/</g,"&lt;")}</div>`;
            f.scrollTop = f.scrollHeight;
        }

        async function tx() {
            const i = document.getElementById('msg'); const txt = i.value.trim(); if(!txt) return;
            const time = new Date().toLocaleTimeString(); add('cl', txt, time, '[LOCAL_TX]'); i.value = "";
            try { await fetch(`https://glitch.me{encodeURIComponent(txt)}&sender=${sid}&time=${encodeURIComponent(time)}`); } catch(e){}
        }

        async function up() {
            const box = document.getElementById('file'); const log = document.getElementById('log');
            if(!box.files[0]) { log.innerText = "❌ Select a file!"; return; }
            log.innerText = "⏳ Uploading binary stream data...";
            const fd = new FormData(); fd.append('file', box.files[0]);
            try {
                const res = await fetch('https://tmpfiles.org', { method: 'POST', body: fd });
                if(res.ok) {
                    const json = await res.json(); const dl = json.data.url.replace('tmpfiles.org/', 'tmpfiles.org/dl/');
                    log.innerText = "✅ Deployed!"; const msg = `📁 LINK: <a href="${dl}" target="_blank" style="color:var(--cyan); font-weight:bold;">[DOWNLOAD]</a>`;
                    add('cl', msg, new Date().toLocaleTimeString(), '[STORAGE_NODE]');
                    try { await fetch(`https://glitch.me{encodeURIComponent(msg)}&sender=${sid}&time=${encodeURIComponent(new Date().toLocaleTimeString())}`); } catch(e){}
                    setTimeout(() => gate('mSec','t1'), 1000);
                } else { log.innerText = "❌ Failed."; }
            } catch(e) { log.innerText = "❌ Network Error."; }
        }
    </script>
</body>
</html>
