<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VR Anime File Hub</title>
    <style>
        :root {
            --bg-color: #0b0813;
            --panel-color: #161224;
            --neon-pink: #ff2a74;
            --neon-cyan: #00f0ff;
            --text-main: #e2dbf0;
        }

        body { 
            font-family: sans-serif; 
            text-align: center; 
            padding: 20px; 
            background-color: var(--bg-color); 
            color: var(--text-main);
            margin: 0;
            position: relative;
            min-height: 100vh;
        }

        /* Moving Cyberpunk Anime Grid Background */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: linear-gradient(rgba(255, 42, 116, 0.08) 1px, transparent 1px),
                        linear-gradient(90deg, rgba(255, 42, 116, 0.08) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: -1;
            animation: gridMove 8s linear infinite;
        }

        @keyframes gridMove {
            0% { background-position: 0 0; }
            100% { background-position: 0 40px; }
        }

        h1 {
            font-size: 2.2rem;
            color: var(--neon-cyan);
            text-shadow: 0 0 15px rgba(0, 240, 255, 0.8);
            margin-bottom: 5px;
            animation: glowPulse 2s ease-in-out infinite alternate;
        }

        @keyframes glowPulse {
            0% { text-shadow: 0 0 8px rgba(0, 240, 255, 0.6); }
            100% { text-shadow: 0 0 20px rgba(0, 240, 255, 1), 0 0 30px rgba(255, 42, 116, 0.5); }
        }

        /* Tab Switch Bar Layout */
        .tab-container {
            display: flex;
            justify-content: center;
            max-width: 450px;
            margin: 25px auto 0 auto;
            gap: 10px;
        }

        .tab-btn {
            flex: 1;
            padding: 12px;
            background: #221a35;
            border: 2px solid #3d2d5a;
            color: var(--text-main);
            font-weight: bold;
            cursor: pointer;
            border-radius: 8px 8px 0 0;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        .tab-btn.active {
            background: var(--panel-color);
            border-color: var(--neon-pink);
            color: var(--neon-pink);
            box-shadow: 0 -4px 10px rgba(255, 42, 116, 0.3);
        }

        /* Main Window Card */
        .window { 
            border: 2px solid var(--neon-pink); 
            padding: 30px 20px; 
            margin: 0 auto 30px auto; 
            max-width: 450px; 
            border-radius: 0 0 12px 12px; 
            background: var(--panel-color);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.8), 0 0 20px rgba(255, 42, 116, 0.3);
            box-sizing: border-box;
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popIn {
            0% { transform: scale(0.9); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .file-wrapper {
            background: #221a35;
            border: 1px dashed var(--neon-cyan);
            padding: 25px;
            border-radius: 8px;
            margin-bottom: 25px;
        }

        input[type="file"] {
            font-size: 15px;
            color: var(--text-main);
            width: 100%;
        }

        .action-btn { 
            background: linear-gradient(45deg, var(--neon-pink), #bc134d); 
            color: #fff; 
            border: none; 
            padding: 15px 30px; 
            font-size: 16px; 
            font-weight: bold; 
            border-radius: 8px; 
            cursor: pointer; 
            width: 100%;
            box-shadow: 0 4px 15px rgba(255, 42, 116, 0.5);
            transition: all 0.2s ease;
        }

        .action-btn:hover { 
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 42, 116, 0.7);
        }

        #status { 
            margin-top: 15px; 
            font-size: 15px; 
            color: #ffeb3b; 
        }

        .download-btn { 
            display: inline-block; 
            background: linear-gradient(45deg, #00b0ff, var(--neon-cyan)); 
            color: #000; 
            text-decoration: none; 
            padding: 16px 25px; 
            font-size: 18px; 
            font-weight: 900; 
            border-radius: 8px; 
            margin-top: 25px; 
            width: 90%;
            box-sizing: border-box;
            box-shadow: 0 5px 20px rgba(0, 240, 255, 0.6); 
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-6px); }
        }
    </style>
</head>
<body>

    <h1>🚀 VR FILE SWAP 🚀</h1>
    <p style="color: #8b7ea3; margin-top: 0;">Anime Core Protocol v2.5</p>

    <div class="tab-container">
        <button id="uploadBtn" class="tab-btn active" onclick="switchTab('uploadTab', 'uploadBtn')">📤 Upload Mode</button>
        <button id="downloadBtn" class="tab-btn" onclick="switchTab('downloadTab', 'downloadBtn')">📥 Download Link</button>
    </div>

    <div class="window">
        <div id="uploadTab" class="tab-content active">
            <div class="file-wrapper">
                <input type="file" id="myFile">
            </div>
            <button class="action-btn" onclick="sendToVR()">INITIALIZE UPLOAD</button>
            <div id="status">System Ready. Ready for stream connection...</div>
        </div>

        <div id="downloadTab" class="tab-content">
            <p style="font-size: 14px; color: #a496c0;">Your download button will appear here once the phone file uploads.</p>
            <div id="target">
                <p style="color: #ff2a74; margin-top: 20px;">⚡ No active transfer links found yet.</p>
            </div>
        </div>
    </div>

    <script>
    function switchTab(tabId, btnId) {
        document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        
        document.getElementById(tabId).classList.add('active');
        document.getElementById(btnId).classList.add('active');
    }

    async function sendToVR() {
        const fileBox = document.getElementById('myFile');
        const statusTxt = document.getElementById('status');
        const targetDiv = document.getElementById('target');

        if (fileBox.files.length === 0) {
            statusTxt.style.color = "#ff2a74";
            statusTxt.innerText = "❌ Select a file first!";
            return;
        }

        statusTxt.style.color = "#ffeb3b";
        statusTxt.innerText = "⏳ Uploading... Processing pipeline stream.";
        targetDiv.innerHTML = "";

        const data = new FormData();
        data.append('file', fileBox.files[0]); 

        try {
            const response = await fetch('https://tmpfiles.org', {
                method: 'POST',
                body: data
            });

            if (response.ok) {
                const json = await response.json();
                const rawUrl = json.data.url;
                const downloadUrl = rawUrl.replace('tmpfiles.org/', 'tmpfiles.org/dl/');
                
                statusTxt.style.color = "#00f0ff";
                statusTxt.innerText = "✅ Upload Successful!";
                
                targetDiv.innerHTML = `
                    <a href="${downloadUrl}" class="download-btn" target="_blank" download>⬇️ DOWNLOAD TARGET IN VR ⬇️</a>
                    <p style="margin-top:20px; color:#8b7ea3; font-size:11px; word-break: break-all;">Link: ${downloadUrl}</p>
                `;
                
                setTimeout(() => {
                    switchTab('downloadTab', 'downloadBtn');
                }, 800);

            } else {
                statusTxt.style.color = "#ff2a74";
                statusTxt.innerText = "❌ Upload failed. File may be too large.";
            }
        } catch (err) {
            statusTxt.style.color = "#ff2a74";
            statusTxt.innerText = "❌ Network Error.";
            console.error(err);
        }
    }
    </script>

</body>
</html>
